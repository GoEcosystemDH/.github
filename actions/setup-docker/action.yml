name: "Setup Docker"
description: "Login a Docker Hub, configurar buildx y generar tags de imagen"

inputs:
  registry:
    description: "Docker registry"
    required: false
    default: "docker.io"
  username:
    description: "Docker Hub username"
    required: true
  password:
    description: "Docker Hub password/token"
    required: true
  image-name:
    description: "Nombre de la imagen Docker"
    required: true

outputs:
  tag-commit:
    description: "Tag con SHA del commit"
    value: ${{ steps.tags.outputs.tag_commit }}
  tag-latest:
    description: "Tag latest"
    value: ${{ steps.tags.outputs.tag_latest }}

runs:
  using: "composite"
  steps:
    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Generar tags de imagen
      id: tags
      shell: bash
      run: |
        REGISTRY="${{ inputs.registry }}"
        USERNAME="${{ inputs.username }}"
        IMAGE="${{ inputs.image-name }}"
        REF_NAME="${{ github.ref_name }}"
        SHA="${{ github.sha }}"

        TAG_LATEST="${REGISTRY}/${USERNAME}/${IMAGE}:latest"
        TAG_COMMIT="${REGISTRY}/${USERNAME}/${IMAGE}:${REF_NAME}-${SHA}"

        echo "tag_latest=$TAG_LATEST" >> "$GITHUB_OUTPUT"
        echo "tag_commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
        echo "Imagen: $TAG_COMMIT"
