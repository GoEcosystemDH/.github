name: "Deploy Docker Compose"
description: "Desplegar servicio usando docker-compose: pull imagen, down, up"

inputs:
  compose-file:
    description: "Ruta al archivo docker-compose.yml"
    required: false
    default: "docker-compose.yml"
  compose-name:
    description: "Nombre del proyecto compose (-p)"
    required: true
  image-tag:
    description: "Tag completo de la imagen a desplegar"
    required: true
  registry:
    description: "Docker registry"
    required: false
    default: "docker.io"
  username:
    description: "Docker Hub username"
    required: true
  password:
    description: "Docker Hub password/token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Actualizar imagen en compose
      shell: bash
      run: |
        sed -i "s|image: .*|image: ${{ inputs.image-tag }}|g" "${{ inputs.compose-file }}"
        echo "Imagen actualizada a: ${{ inputs.image-tag }}"

    - name: Detener servicio actual
      shell: bash
      run: |
        docker compose -p "${{ inputs.compose-name }}" -f "${{ inputs.compose-file }}" down || true

    - name: Iniciar servicio con nueva imagen
      shell: bash
      run: |
        docker compose -p "${{ inputs.compose-name }}" -f "${{ inputs.compose-file }}" up -d

    - name: Verificar estado del servicio
      shell: bash
      run: |
        sleep 5
        docker compose -p "${{ inputs.compose-name }}" -f "${{ inputs.compose-file }}" ps
        echo ""
        echo "Deploy completado: ${{ inputs.compose-name }} → ${{ inputs.image-tag }}"
