name: "Reporte de Bug"
description: "Reportar un error o comportamiento inesperado"
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por tomarte el tiempo de reportar este bug. Completa la información a continuación para ayudarnos a resolverlo rápidamente.
  - type: input
    id: task-azdo
    attributes:
      label: "Task Azure DevOps"
      description: "Link a la task o work item relacionado en Azure DevOps (si existe)"
      placeholder: "https://dev.azure.com/goecosystem/Go-Devops/_workitems/edit/XXXX"
    validations:
      required: false
  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción del Bug"
      description: "Describe claramente qué está fallando"
      placeholder: "Cuando hago X, ocurre Y en lugar de Z"
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: "Pasos para Reproducir"
      description: "Lista los pasos exactos para reproducir el bug"
      value: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Observar el error
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: "Comportamiento Esperado"
      description: "¿Qué debería ocurrir?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Comportamiento Actual"
      description: "¿Qué ocurre realmente?"
    validations:
      required: true
  - type: dropdown
    id: severidad
    attributes:
      label: "Severidad"
      options:
        - Crítica (sistema caído)
        - Alta (funcionalidad principal afectada)
        - Media (funcionalidad secundaria afectada)
        - Baja (cosmético o menor)
    validations:
      required: true
  - type: textarea
    id: ambiente
    attributes:
      label: "Ambiente"
      description: "Información del ambiente donde ocurre"
      value: |
        - Servidor/Sede:
        - Navegador:
        - Sistema Operativo:
        - Versión de la aplicación:
    validations:
      required: false
  - type: textarea
    id: capturas
    attributes:
      label: "Capturas de Pantalla o Logs"
      description: "Agrega capturas o logs relevantes"
    validations:
      required: false
