name: "Task"
description: "Registrar una tarea tecnica o de desarrollo"
title: "[TASK]: "
labels: ["task"]
body:
  - type: input
    id: task-azdo
    attributes:
      label: "Task Azure DevOps"
      description: "Link al work item en Azure DevOps"
      placeholder: "https://dev.azure.com/goecosystem/Go-Devops/_workitems/edit/XXXX"
    validations:
      required: true
  - type: textarea
    id: descripcion
    attributes:
      label: "Que hay que hacer?"
      description: "Describe la tarea en 1-3 lineas"
    validations:
      required: true
  - type: textarea
    id: criterios
    attributes:
      label: "Criterios de completado"
      description: "Como sabemos que esta tarea esta terminada?"
      value: |
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: prioridad
    attributes:
      label: "Prioridad"
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true
