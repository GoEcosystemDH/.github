name: PR Metadata Enrichment

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  enrich:
    name: Auto-generate PR metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate metadata
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;

            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr_number, per_page: 300
            });

            const filePaths = files.map(f => f.filename);
            const additions = files.reduce((s, f) => s + f.additions, 0);
            const deletions = files.reduce((s, f) => s + f.deletions, 0);
            const totalChanges = additions + deletions;

            // --- IMPACT AREA DETECTION ---
            const areas = new Set();
            const patterns = {
              'frontend': [/\.(jsx?|tsx?|vue|svelte|css|scss|html)$/, /src\/app\//, /src\/components\//, /src\/views\//],
              'backend': [/controllers\//, /models\//, /routes\//, /services\//, /app\.js/, /server\./],
              'api': [/api\//, /routes\//, /endpoints\//, /swagger/],
              'database': [/migration/, /\.sql$/, /database\.php/, /schema/, /seeds\//],
              'infra': [/Dockerfile/, /docker-compose/, /nginx/, /\.github\/workflows\//],
              'config': [/\.env/, /config\//, /\.yml$/, /\.yaml$/, /\.json$/],
              'tests': [/test\//, /spec\//, /\.test\./, /\.spec\./],
              'docs': [/\.md$/, /docs\//]
            };

            for (const [area, regexes] of Object.entries(patterns)) {
              for (const file of filePaths) {
                if (regexes.some(r => r.test(file))) {
                  areas.add(area);
                  break;
                }
              }
            }

            // --- DOMAIN DETECTION (from repo name) ---
            const domainMap = {
              'his': 'HIS (Sistema Hospitalario)',
              'citapp': 'Citas / Cero Tramites',
              'cero-tramites': 'Citas / Cero Tramites',
              'staff': 'Staff',
              'asm': 'AMS (Atencion Medica)',
              'rcf': 'Registro Clinico Facil',
              'costos': 'Costos / CMI',
              'cuadro-mando': 'Costos / CMI',
              'viaticos': 'Viaticos',
              'turnero': 'Turnero',
              'go-pdf': 'Go PDF',
              'gestion-notificaciones': 'Notificaciones',
              'docker-infra': 'Infraestructura',
              'qse': 'QSE',
              'mipres': 'MIPRES',
              'cotizador': 'Cotizador',
              'aigenda': 'AIGenda',
              'metric': 'Metric Hub'
            };

            let domain = 'General';
            for (const [key, value] of Object.entries(domainMap)) {
              if (repo.includes(key)) { domain = value; break; }
            }

            // --- DEPENDENCY DETECTION ---
            const dependencies = [];
            if (filePaths.some(f => /migration|\.sql/.test(f))) dependencies.push('Migracion de BD');
            if (filePaths.some(f => /\.env/.test(f))) dependencies.push('Variables de entorno');
            if (filePaths.some(f => /Dockerfile|docker-compose/.test(f))) dependencies.push('Docker / Infra');
            if (filePaths.some(f => /package\.json|composer\.json|go\.mod/.test(f))) dependencies.push('Dependencias');
            if (filePaths.some(f => /\.github\/workflows/.test(f))) dependencies.push('CI/CD Pipeline');

            // --- BREAKING CHANGES DETECTION ---
            const breaking = [];
            if (filePaths.some(f => /routes\//.test(f))) breaking.push('Posible cambio en endpoints API');
            if (filePaths.some(f => /migration/.test(f))) breaking.push('Migracion de base de datos');
            if (filePaths.some(f => /docker-compose/.test(f) && files.find(ff => ff.filename === f && ff.status === 'modified'))) breaking.push('Cambio en configuracion Docker');

            // --- SIZE CATEGORY ---
            let size = 'XS';
            if (totalChanges > 500) size = 'XL';
            else if (totalChanges > 200) size = 'L';
            else if (totalChanges > 50) size = 'M';
            else if (totalChanges > 10) size = 'S';

            // --- MODULES AFFECTED ---
            const modules = new Set();
            for (const file of filePaths) {
              const parts = file.split('/');
              if (parts.length >= 2) {
                // Get first meaningful directory
                const mod = parts[0] === 'src' ? parts[1] : parts[0];
                modules.add(mod);
              }
            }

            // --- AUTO LABELS ---
            const labelsToAdd = [];
            areas.forEach(a => labelsToAdd.push(`area:${a}`));
            labelsToAdd.push(`size:${size}`);
            if (dependencies.length > 0) labelsToAdd.push('needs:review-deploy');
            if (breaking.length > 0) labelsToAdd.push('breaking-change');

            // Create labels if they don't exist and apply them
            for (const label of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch {
                const colors = {
                  'area:frontend': '61dafb', 'area:backend': '68217a', 'area:api': '0052cc',
                  'area:database': 'e6a817', 'area:infra': '333333', 'area:config': 'c5def5',
                  'area:tests': '2ea44f', 'area:docs': '0075ca',
                  'size:XS': '009900', 'size:S': '77bb00', 'size:M': 'eebb00',
                  'size:L': 'ee9900', 'size:XL': 'ee0000',
                  'needs:review-deploy': 'ff6600', 'breaking-change': 'b60205'
                };
                await github.rest.issues.createLabel({
                  owner, repo, name: label,
                  color: colors[label] || 'ededed'
                });
              }
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr_number, labels: labelsToAdd
            });

            // --- BUILD METADATA COMMENT ---
            const now = new Date().toISOString();
            const filesTable = filePaths.slice(0, 20).map(f => {
              const fileData = files.find(ff => ff.filename === f);
              return `| \`${f}\` | +${fileData.additions} -${fileData.deletions} | ${fileData.status} |`;
            }).join('\n');

            const comment = `## 🤖 PR Metadata (auto-generated)

            > _Generado automaticamente para KB/RAG — no editar_

            | Campo | Valor |
            |-------|-------|
            | **Repositorio** | \`${repo}\` |
            | **Dominio** | ${domain} |
            | **Areas de impacto** | ${[...areas].map(a => \`\\\`\${a}\\\`\`).join(', ') || 'N/A'} |
            | **Tamano del cambio** | ${size} (+${additions} -${deletions}, ${filePaths.length} archivos) |
            | **Modulos afectados** | ${[...modules].slice(0, 10).map(m => \`\\\`\${m}\\\`\`).join(', ')} |
            | **Dependencias de deploy** | ${dependencies.length > 0 ? dependencies.join(', ') : 'Ninguna'} |
            | **Breaking changes** | ${breaking.length > 0 ? breaking.join(', ') : 'Ninguno detectado'} |
            | **Branch** | \`${context.payload.pull_request.head.ref}\` → \`${context.payload.pull_request.base.ref}\` |
            | **Autor** | @${context.payload.pull_request.user.login} |
            | **Fecha analisis** | ${now} |

            ### Archivos modificados (top ${Math.min(filePaths.length, 20)})

            | Archivo | Cambios | Estado |
            |---------|---------|--------|
            ${filesTable}
            ${filePaths.length > 20 ? \`\n_... y \${filePaths.length - 20} archivos mas_\` : ''}

            ---
            <sub>🔑 metadata-version: 1.0 | extractable: true | format: structured</sub>`;

            // Find existing bot comment to update instead of creating duplicates
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: pr_number
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Metadata (auto-generated)')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr_number, body: comment
              });
            }

            console.log(`Metadata generated: domain=${domain}, areas=${[...areas]}, size=${size}, deps=${dependencies}`);
