name: Secret Scanning (Gitleaks)

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks (PR - scan diff only)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect --source . --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose --exit-code 1

      - name: Run Gitleaks (Push - scan last commit)
        if: github.event_name == 'push'
        run: |
          gitleaks detect --source . --log-opts "HEAD~1..HEAD" --verbose --exit-code 1
