name: "PR Size Labeler"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  size-label:
    name: Asignar label de tamaño al PR
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/XS"
          xs_max_size: 10
          s_label: "size/S"
          s_max_size: 50
          m_label: "size/M"
          m_max_size: 200
          l_label: "size/L"
          l_max_size: 500
          xl_label: "size/XL"
          fail_if_xl: false
          message_if_xl: |
            Este PR es **XL** (más de 500 líneas cambiadas).
            Considera dividirlo en PRs más pequeños para facilitar el code review.
          files_to_ignore: |
            package-lock.json
            go.sum
            *.lock
