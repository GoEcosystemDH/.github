name: "Auto PR: develop → main"

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-or-update-pr:
    name: Sync develop → main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Check for diff and create/update PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = 'develop';
            const base = 'main';

            let comparison;
            try {
              comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo, basehead: `${base}...${source}`
              });
            } catch (e) {
              console.log(`Cannot compare: ${e.message}`);
              return;
            }

            const commits = comparison.data.commits;
            if (commits.length === 0) {
              console.log('No commits ahead. Nothing to do.');
              return;
            }

            console.log(`Found ${commits.length} commits ahead of ${base}`);

            const commitsTable = commits.slice(-30).map(c => {
              const sha = c.sha.substring(0, 7);
              const author = c.author ? `@${c.author.login}` : c.commit.author.name;
              const msg = c.commit.message.split('\n')[0].substring(0, 80);
              const date = c.commit.author.date.substring(0, 10);
              return `| \`${sha}\` | ${author} | ${msg} | ${date} |`;
            }).join('\n');

            const categories = { feat: 0, fix: 0, refactor: 0, chore: 0, ci: 0, docs: 0, test: 0, other: 0 };
            for (const c of commits) {
              const msg = c.commit.message.toLowerCase();
              const type = Object.keys(categories).find(t => msg.startsWith(t + ':') || msg.startsWith(t + '('));
              categories[type || 'other']++;
            }
            const catSummary = Object.entries(categories).filter(([_, n]) => n > 0).map(([t, n]) => `**${t}**: ${n}`).join(' | ');

            const body = `## 🔄 Sync: develop → main\n\n### Resumen\n- **${commits.length} commits** pendientes\n- Tipos: ${catSummary}\n- Archivos: ${comparison.data.files?.length || 'N/A'}\n\n### Commits\n\n| SHA | Autor | Mensaje | Fecha |\n|-----|-------|---------|-------|\n${commitsTable}\n${commits.length > 30 ? `\n_... y ${commits.length - 30} mas_` : ''}\n\n---\n> 🤖 PR generado automaticamente.\n> <sub>auto-sync-version: 1.0</sub>`;

            const { data: existingPRs } = await github.rest.pulls.list({
              owner, repo, head: `${owner}:${source}`, base, state: 'open'
            });

            const autoSyncPR = existingPRs.find(pr => pr.title.includes('sync:'));

            if (autoSyncPR) {
              await github.rest.pulls.update({ owner, repo, pull_number: autoSyncPR.number, body });
              console.log(`Updated PR #${autoSyncPR.number}`);
            } else {
              try { await github.rest.issues.createLabel({ owner, repo, name: 'auto-sync', color: '0e8a16', description: 'PR auto-generado' }); } catch {}
              const { data: pr } = await github.rest.pulls.create({ owner, repo, title: `sync: develop → main`, head: source, base, body });
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['auto-sync'] });
              console.log(`Created PR #${pr.number}`);
            }
